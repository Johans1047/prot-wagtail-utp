services:
  jicweb_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jicweb_app
    command: python mysite/manage.py runserver 0.0.0.0:8000
    volumes:
      - ./jic/mysite:/app/mysite
      - static_files:/app/mysite/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - PYTHONUNBUFFERED=1
      # - DB_ENGINE=postgres
      - DB_NAME=db_jicweb
      - DB_USER=mast_jicweb
      - DB_PASSWORD=g0hNw,0p1M\v£Y
      - DB_HOST=jicweb_master
      - DB_PORT=5432
      - DB_SSLMODE=require
      - DB_CHANNEL_BINDING=require
      - DB_OPTIONS=-c search_path=public
      - MINIO_ENDPOINT=jic_minio_storage:9000
      - MINIO_ACCESS_KEY=mast_st_jic
      - MINIO_SECRET_KEY=KtWzuaY3Uy8F
      - MINIO_USE_SSL=false
      - MINIO_BUCKET_NAME=jic-media
    depends_on:
      jic_minio_storage:
        condition: service_healthy
    networks:
      - netX

  jicweb_app_livereload:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jicweb_app_livereload
    command: python mysite/manage.py livereload --host=0.0.0.0 --port=35729
    volumes:
      - ./jic/mysite:/app/mysite
    ports:
      - "35729:35729"
    environment:
      - DEBUG=True
      - PYTHONUNBUFFERED=1
      # - DB_ENGINE=postgres
      - DB_NAME=db_jicweb
      - DB_USER=mast_jicweb
      - DB_PASSWORD=g0hNw,0p1M\v£Y
      - DB_HOST=jicweb_master
      - DB_PORT=5432
      - DB_SSLMODE=require
      - DB_CHANNEL_BINDING=require
      - DB_OPTIONS=-c search_path=public
    depends_on:
      - jicweb_app
    networks:
      - netX

  jicweb_master:
    image: 'bitnamilegacy/postgresql:17'
    ports:
      - '5440:5432'
    networks:
      netX:
        ipv4_address: 172.20.1.85
    volumes:
      - 'jicweb_master_data_v1:/bitnami/postgresql'
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_POSTGRES_PASSWORD=1*o63U9JlN5bLp
      - POSTGRESQL_REPLICATION_USER=repl_jicweb
      - POSTGRESQL_REPLICATION_PASSWORD=2U552^2UP?yU]>
      - POSTGRESQL_USERNAME=mast_jicweb
      - POSTGRESQL_PASSWORD=g0hNw,0p1MvY
      - POSTGRESQL_DATABASE=db_jicweb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mast_jicweb -d db_jicweb"]
      interval: 10s
      timeout: 5s
      retries: 5

  jicweb_slave:
    image: 'bitnamilegacy/postgresql:17'
    ports:
      - '5432'
    networks:
      - netX
    depends_on:
      jicweb_master:
        condition: service_healthy
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_jicweb
      - POSTGRESQL_REPLICATION_PASSWORD=2U552^2UP?yU]>
      - POSTGRESQL_MASTER_HOST=172.20.1.85
      - POSTGRESQL_PASSWORD=g0hNw,0p1MvY
      - POSTGRESQL_MASTER_PORT_NUMBER=5432

  jic_minio_storage:
    restart: "no"
    image: bitnami/minio:latest
    ports:
      - 9010:9000
      - 9011:9001
    environment:
      - MINIO_ROOT_USER=mast_st_jic
      - MINIO_ROOT_PASSWORD=KtWzuaY3Uy8F
      - MINIO_CONSOLE_ADDRESS=:9001
      - TZ=UTC
    networks:
      netX:
        ipv4_address: 172.20.0.75
    volumes:
      - 'jicst_storage_data:/bitnami/minio/data'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jicst_storage_data:
    driver: local
  jicweb_master_data_v1:
    driver: local
  static_files:
    driver: local

networks:
  netX:
    name: netX
    external: true

