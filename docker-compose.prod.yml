services:

  jicweb_nginx:
    image: nginx:latest
    container_name: jicweb_nginx
    ports:
      - "8002:80"
    volumes:
      # - ./nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./jic/mysite/theme/static:/static:ro
    depends_on:
      - jicweb_app
    networks:
      - netX 
    restart: unless-stopped

  jicweb_app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: jicweb_app
    env_file:
      - .env.prod
    volumes:
      # - ./jic/mysite:/app/
      - ./jic/mysite/theme/static:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG}
      - TAILWIND_WATCH=0
      # - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - DB_REPLICATION_ENABLED=${DB_REPLICATION_ENABLED}
      # PostgreSQL connection (jicweb_master container) - using postgres user
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_POSTGRES_USERNAME=${POSTGRESQL_POSTGRES_USERNAME}
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_DATABASE_PORT_NUMBER=${POSTGRESQL_DATABASE_PORT_NUMBER}
      - JIC_PROJECTS_API_URL=${JIC_PROJECTS_API_URL:-http://jic_projects_mock_api:8001/api/proyectos-jic}
      - JIC_PROJECTS_API_TIMEOUT=${JIC_PROJECTS_API_TIMEOUT:-3}
      - JIC_PROJECTS_PREFER_API=${JIC_PROJECTS_PREFER_API:-0}
      # - DB_OPTIONS=-c search_path=public
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    depends_on:
      jic_minio_storage:
        condition: service_healthy
    networks:
      - netX

  jic_projects_mock_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jic_projects_mock_api
    env_file:
      - .env.prod
    command: >
      sh -c "pip install --no-cache-dir -r /app/mock_projects_api/requirements.txt && uvicorn mock_projects_api.app:app --host 0.0.0.0 --port 8001"
    volumes:
      - ./mock_projects_api:/app/mock_projects_api
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    networks:
      - netX

  jic_projects_sync_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jic_projects_sync_worker
    env_file:
      - .env.prod
    command: >
      sh -c "
        INTERVAL=$${JIC_PROJECTS_SYNC_INTERVAL:-60};
        echo \"[projects-sync] Interval: $${INTERVAL}s (weekly)\";
        while true; do
          TS=$$(date -u +%Y-%m-%dT%H:%M:%SZ);
          echo \"[$$TS] Running API->DB sync...\";
          python mysite/manage.py sync_projects_api --skip-checks || echo \"[$$TS] Sync failed; retrying next cycle.\";
          sleep $${INTERVAL};
        done
      "
    volumes:
      - ./jic/mysite:/app/mysite
    environment:
      - DEBUG=${DEBUG}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - DB_REPLICATION_ENABLED=${DB_REPLICATION_ENABLED}
      # PostgreSQL connection variables consumed by mysite/settings/base.py
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_POSTGRES_USERNAME=${POSTGRESQL_POSTGRES_USERNAME}
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_DATABASE_PORT_NUMBER=${POSTGRESQL_DATABASE_PORT_NUMBER}
      - JIC_PROJECTS_API_URL=${JIC_PROJECTS_API_URL:-http://jic_projects_mock_api:8001/api/proyectos-jic}
      - JIC_PROJECTS_API_TIMEOUT=${JIC_PROJECTS_API_TIMEOUT:-3}
      - JIC_PROJECTS_AUTO_SYNC_DB=${JIC_PROJECTS_AUTO_SYNC_DB:-1}
      - JIC_PROJECTS_SYNC_INTERVAL=${JIC_PROJECTS_SYNC_INTERVAL:-60}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    depends_on:
      jicweb_master:
        condition: service_healthy
      jic_projects_mock_api:
        condition: service_started
    restart: unless-stopped
    networks:
      - netX

  jicweb_master:
    image: 'bitnamilegacy/postgresql:17'
    ports:
      - '5440:5432'
    env_file:
      - .env.prod    
    networks:
      netX:
        ipv4_address: 172.20.1.85
    volumes:
      - 'jicweb_master_data_v1:/bitnami/postgresql'
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_POSTGRES_USERNAME=${POSTGRESQL_POSTGRES_USERNAME}
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_REPLICATION_USER=${DB_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${DB_REPLICATION_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mast_jicweb -d db_jicweb"]
      interval: 10s
      timeout: 5s
      retries: 5

  jicweb_slave:
    image: 'bitnamilegacy/postgresql:17'
    ports:
      - '5432'
    env_file:
      - .env.prod
    networks:
      - netX
    depends_on:
      jicweb_master:
        condition: service_healthy
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=${DB_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${DB_REPLICATION_PASSWORD}
      - POSTGRESQL_MASTER_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_MASTER_PORT_NUMBER=${POSTGRESQL_DATABASE_PORT_NUMBER}

  jic_minio_storage:
    restart: "no"
    image: bitnami/minio:latest
    ports:
      - 9010:9000
      - 9011:9001
    env_file:
      - .env.prod
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_CONSOLE_ADDRESS=:9001
      - MINIO_DEFAULT_BUCKETS=${MINIO_BUCKET_NAME}:public
      - MINIO_SCHEME=http
      - MINIO_SKIP_CLIENT=no
      - TZ=UTC
    networks:
      netX:
        ipv4_address: 172.20.0.75
    volumes:
      - 'jicst_storage_data:/bitnami/minio/data'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  jic_minio_backup:
    image: bitnami/minio:latest
    env_file:
      - .env.prod
    entrypoint: |
      /bin/bash -c "
        mc alias set src http://172.20.0.75:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
          echo \"[$$TIMESTAMP] Iniciando backup de MinIO...\";
          mc mirror --overwrite src/${MINIO_BUCKET_NAME} /bitnami/minio/backups/$$(date +%Y%m%d)/ || echo \"[$$TIMESTAMP] ERROR: Falló el backup\";
          echo \"[$$TIMESTAMP] Backup completado en /bitnami/minio/backups/$$(date +%Y%m%d)/\";
          sleep 86400;
        done
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    volumes:
      - jicst_backup_data:/bitnami/minio/backups
    depends_on:
      jic_minio_storage:
        condition: service_healthy
    networks:
      - netX
    restart: unless-stopped

  jic_db_backup:
    image: bitnamilegacy/postgresql:17
    env_file:
      - .env.prod
    entrypoint: |
      /bin/bash -c "
        export PGPASSWORD=1*o63U9JlN5bLp;
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
          BACKUP_FILE=/bitnami/postgresql/backups/$$(date +%Y%m%d)/db_jicweb_$$TIMESTAMP.sql.gz;
          mkdir -p /bitnami/postgresql/backups/$$(date +%Y%m%d);
          echo \"[$$TIMESTAMP] Iniciando backup de PostgreSQL...\";
          pg_dump -h 172.20.1.85 -U mast_jicweb -d db_jicweb | gzip > $$BACKUP_FILE || echo \"[$$TIMESTAMP] ERROR: Falló el backup\";
          echo \"[$$TIMESTAMP] Backup completado: $$BACKUP_FILE\";
          find /bitnami/postgresql/backups -name '*.sql.gz' -mtime +30 -delete;
          sleep 86400;
        done
      "
    volumes:
      - jicweb_master_data_backup_v1:/bitnami/postgresql/backups
    depends_on:
      jicweb_master:
        condition: service_healthy
    networks:
      - netX
    restart: unless-stopped

volumes:
  jicst_storage_data:
    driver: local
  jicst_backup_data:
    driver: local
  jicweb_master_data_v1:
    driver: local
  jicweb_master_data_backup_v1:
    driver: local
  static_files:
    driver: local

networks:
  netX:
    name: netX
    external: true