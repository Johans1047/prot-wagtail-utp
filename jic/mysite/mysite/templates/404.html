{% extends "_base.html" %}
{% load static %}

{% block title %}Página no encontrada (404){% endblock %}

{% block content %}
<section class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4 py-20 bg-card">
    <div class="mb-8 w-full max-w-md mx-auto">
        <img src="{% static 'img/404_not_found.jpg' %}" alt="404 Not Found" class="w-full h-auto object-contain mx-auto">
    </div>
    
    <h2 class="text-xl font-serif text-foreground mb-6">Página no encontrada</h2>
    <p class="text-muted-foreground max-w-lg mb-8 text-lg">
        Lo sentimos, la página que estás buscando no existe o ya no está disponible.
    </p>
    
    <div class="flex gap-4 flex-wrap justify-center mb-10">
        <a href="{% url 'Inicio' %}" class="inline-flex items-center justify-center rounded-lg bg-primary px-6 py-3 text-base font-medium text-white shadow transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50">
            Volver al inicio
        </a>
        <button onclick="history.back()" class="inline-flex items-center justify-center rounded-lg border border-input bg-white px-6 py-3 text-base font-medium shadow-sm transition-colors hover:bg-stone-100 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 cursor-pointer">
            Regresar
        </button>
    </div>
</section>
{% endblock %}
