<section class="bg-white dark:bg-gray-900">
    <div class="py-8 px-4 mx-auto max-w-7xl sm:py-16 lg:px-6">
        <h2 class="font-serif mb-6 lg:mb-8 text-2xl md:text-3xl tracking-tight font-extrabold text-center text-foreground">
            Preguntas Frecuentes
        </h2>
        <p class="mb-6 lg:mb-8 text-sm sm:text-base md:text-lg tracking-tight font-normal text-center text-muted-foreground">
            Todo lo que necesitas saber sobre la Jornada de Iniciación Científica
        </p>

        <div class="mx-auto max-w-3xl">
            {% for key, section in faqs.items %}
                <details class="border-b border-border group">
                    <summary class="flex justify-between items-center py-5 w-full font-bold text-left text-base md:text-lg cursor-pointer transition-colors duration-200 text-muted-foreground hover:text-foreground">
                        <span>{{ section.title }}</span>
                        <svg class="w-6 h-6 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                        </svg>
                    </summary>

                    <div class="pl-4 border-l-2 border-gray-100 dark:border-gray-800 mb-2">
                        {% for item in section.items %}
                            <details class="border-b border-border last:border-b-0">
                                <summary class="flex justify-between items-center py-4 w-full font-medium text-left text-sm sm:text-base cursor-pointer transition-colors duration-200 text-muted-foreground hover:text-foreground list-none">
                                    <span class="pr-4">{{ item.q }}</span>
                                    <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                                    </svg>
                                </summary>
                                <div class="pb-4">
                                    <p class="text-gray-500 dark:text-gray-400 leading-relaxed text-sm sm:text-base">
                                        {{ item.a }}
                                    </p>
                                </div>
                            </details>
                        {% endfor %}
                    </div>
                </details>
            {% endfor %}
        </div>
    </div>
</section>

<style>
    details > * {
        animation: slideDown 0.3s ease-in-out;
    }
    
    details[open] > summary ~ * {
        animation: slideDown 0.3s ease-in-out;
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    summary::-webkit-details-marker {
        display: none;
    }
    
    details > summary svg {
        transition: transform 0.3s ease-in-out;
    }
    
    details[open] > summary svg {
        transform: rotate(180deg);
    }
</style>
