{% load static %}
<header>
    <nav
        aria-label="Navegación principal"
        class="bg-neutral-card/95 backdrop-blur-sm supports-backdrop-filter:bg-card/95 fixed w-full z-[9998] top-0 inset-s-0 border-b border-default px-0.5 max-h-18"
    >
        <div
            class="max-w-7xl flex flex-wrap items-center justify-between mx-auto p-4"
        >
            <a
                href="{% url 'Inicio' %}"
                class="flex items-center space-x-3 rtl:space-x-reverse"
            >
                <img
                    src="{% static 'img/Recurso 6JIC LOGO.svg' %}"
                    class="h-6 sm:h-8 md:h-9"
                    alt="JIC Logo"
                />
            </a>
            <div
                class="flex lg:order-2 space-x-3 lg:space-x-0 rtl:space-x-reverse"
            >
                <button
                    type="button"
                    class="cursor-pointer text-primary-foreground bg-primary hover:bg-primary/90 box-border border border-transparent focus:ring-3 focus:ring-cobalt-700 shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2 focus:outline-none"
                >
                    Plataforma JIC
                </button>
                <button
                    data-collapse-toggle="navbar-sticky"
                    type="button"
                    class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base lg:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
                    aria-controls="navbar-sticky"
                    aria-expanded="false"
                >
                    <span class="sr-only">Abrir menú principal</span>
                    <svg
                        class="w-6 h-6"
                        aria-hidden="true"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        fill="none"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke="currentColor"
                            stroke-linecap="round"
                            stroke-width="2"
                            d="M5 7h14M5 12h14M5 17h14"
                        />
                    </svg>
                </button>
            </div>
            <div
                class="rounded-base items-center justify-between hidden w-full lg:flex lg:w-auto lg:order-1 bg-card"
                id="navbar-sticky"
            >
                {% with path=request.path %}
                <ul
                    class="flex flex-col p-4 gap-1 lg:p-0 mt-0 font-medium lg:space-x-1 rtl:space-x-reverse lg:flex-row lg:mt-0 lg:border-0"
                >
                    {% for item in nav_items %}
                    <li>
                        <a
                            href="{{ item.url }}"
                            class="block lg:rounded-md px-3 py-1.5 lg:py-2 font-medium transition-colors max-lg:rounded-sm {% if path == item.url %}bg-primary/10 text-primary{% else %}text-muted-foreground lg:hover:bg-secondary/70 hover:text-foreground max-lg:hover:bg-secondary/15{% endif %}"
                            {% if path == item.url %}aria-current="page"{% endif %}
                        >{{ item.label }}</a>
                    </li>
                    {% endfor %}
                </ul>
                {% endwith %}
            </div>
        </div>
    </nav>
</header>
