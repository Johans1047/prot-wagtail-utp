<section class="bg-card py-16 lg:py-24">
    <div class="mx-auto max-w-7xl px-4 lg:px-8">
        <div class="mb-10 flex items-center gap-3">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-history h-6 w-6 text-primary"
                aria-hidden="true"
                ><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"
                ></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"
                ></path></svg
            >
            <h2 class="font-serif text-2xl text-foreground md:text-3xl">
                Antecedentes
            </h2>
        </div>
        <div class="relative ml-6 border-l-2 border-primary/30 pl-8">
            {% for item in background_items %}
            <div class="relative mb-8 last:mb-0">
                <div
                    class="absolute -left-9.75 top-1 h-3 w-3 rounded-full bg-primary"
                ></div>
                <span
                    class="inline-block rounded-full bg-primary/10 px-3 py-0.5 text-xs font-bold text-primary"
                    >{{ item.year_label }}</span
                >
                <p class="mt-2 leading-relaxed text-muted-foreground">
                    {{ item.description }}
                </p>
            </div>
            {% empty %}
            <p class="text-muted-foreground">No hay antecedentes publicados.</p>
            {% endfor %}
        </div>
    </div>
</section>
