<div>
    <div class="mb-8 text-center">
        <h2 class="font-serif text-2xl text-foreground md:text-3xl">
            Reconocimientos
        </h2>
        <p class="mt-2 text-muted-foreground">
            Premios y distinciones recibidos a lo largo de los años
        </p>
    </div>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        {% for r in awards %}
            <div
                class="rounded-xl border border-border bg-stone-neutral-50 p-5 flex flex-col gap-3"
            >
                <div class="flex items-start justify-between gap-4">
                    <div class="min-w-0">
                        <span
                            class="inline-block rounded-full bg-yellow-300/20 px-2.5 py-0.5 text-xs font-semibold text-yellow-700 mb-1"
                            >{{ r.year }}</span
                        >
                        <h3
                            class="font-semibold text-foreground leading-snug"
                        >
                            {{ r.prize }}
                        </h3>
                        <p class="text-xs text-muted-foreground mt-0.5">
                            {{ r.entity }}
                        </p>
                    </div>
                    {% if r.image %}
                    <img
                        src="{{ r.image.url }}"
                        alt="Logo de {{ r.entity }}"
                        class="size-21 rounded-md shrink-0 object-cover border border-border bg-white"
                        loading="lazy"
                    />
                    {% else %}
                    <div
                        class="flex h-14 w-14 shrink-0 items-center justify-center rounded-xl bg-yellow-300/20"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="text-yellow-500"
                        >
                            <path
                                d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"
                            />
                            <path d="M11 12 5.12 2.2" /><path
                                d="m13 12 5.88-9.8"
                            />
                            <path d="M8 7h8" /><circle
                                cx="12"
                                cy="17"
                                r="5"
                            />
                            <path d="M12 18v-2h-.5" />
                        </svg>
                    </div>
                    {% endif %}
                </div>
                <p
                    class="text-sm text-muted-foreground leading-relaxed"
                >
                    {{ r.description }}
                </p>
            </div>
        {% empty %}
            <p class="text-muted-foreground col-span-3">No hay reconocimientos publicados.</p>
        {% endfor %}
    </div>
</div>
