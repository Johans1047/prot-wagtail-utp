<div class="fixed bottom-6 right-4 sm:bottom-8 sm:right-8 z-50">
    <details class="group relative">
        <summary class="list-none cursor-pointer flex items-center gap-2" aria-label="Abrir acciones rápidas">
            <span
                class="flex items-center justify-center w-14 h-14 rounded-full bg-primary text-primary-foreground shadow-lg hover:bg-primary/90 transition-colors"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6 group-open:hidden"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                >
                    <path
                        fill-rule="evenodd"
                        d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                        clip-rule="evenodd"
                    />
                </svg>
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="hidden h-6 w-6 group-open:block"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M6 18L18 6M6 6l12 12"
                    />
                </svg>
            </span>
        </summary>

        <div
            class="absolute bottom-16 right-0 flex flex-col gap-2 bg-card border border-default rounded-xl p-2 shadow-xl min-w-40"
        >
            <a
                href="{% url 'Busqueda' %}"
                class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-foreground hover:bg-secondary/35 transition-colors"
                title="Buscar proyectos, documentos y noticias"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                >
                    <path
                        fill-rule="evenodd"
                        d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                        clip-rule="evenodd"
                    />
                </svg>
                Buscar
            </a>
            <a
                href="{% url 'Noticias' %}"
                class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-foreground hover:bg-secondary/35 transition-colors"
                title="Ver noticias"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M19 5H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2z"
                    />
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M7 9h10M7 13h6"
                    />
                </svg>
                Noticias
            </a>
        </div>
    </details>
</div>
