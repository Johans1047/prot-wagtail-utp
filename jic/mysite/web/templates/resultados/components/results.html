<section class="py-16 lg:py-20 bg-card">
    <div class="mx-auto max-w-7xl px-4 lg:px-8">
        <h2
            class="mb-6 font-serif text-2xl text-foreground md:text-3xl lg:text-4xl"
        >
            Edición actual: JIC {% now "Y" %}
        </h2>

        <div class="flex flex-col gap-12">
            <!-- Selecciones institucionales -->
            <article class="rounded-xl border border-border bg-stone-50 p-6">
                <div
                    class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
                >
                    <div class="flex items-center gap-4">
                        <div
                            class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary/10"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="h-6 w-6 text-primary"
                            >
                                <rect
                                    width="16"
                                    height="20"
                                    x="4"
                                    y="2"
                                    rx="2"
                                    ry="2"
                                ></rect>
                                <path d="M9 22v-4h6v4"></path>
                                <path d="M8 6h.01"></path>
                                <path d="M16 6h.01"></path>
                                <path d="M12 6h.01"></path>
                                <path d="M8 10h.01"></path>
                                <path d="M16 10h.01"></path>
                                <path d="M12 10h.01"></path>
                            </svg>
                        </div>
                        <div>
                            <h3 class="font-semibold text-foreground">
                                Selecciones Institucionales
                            </h3>
                            <p class="text-sm text-muted-foreground">
                                Resultados de las fases internas de cada
                                universidad
                            </p>
                        </div>
                    </div>
                    <a
                        href="{% url 'Selecciones' %}"
                        class="inline-flex items-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-primary-foreground transition-colors hover:bg-primary/90 whitespace-nowrap"
                    >
                        Ver selecciones
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-4 w-4"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M17 8l4 4m0 0l-4 4m4-4H3"
                            ></path>
                        </svg>
                    </a>
                </div>
            </article>

            <!-- Resultados pendientes -->
            <aside
                class="rounded-xl border-2 border-dashed border-border bg-card p-8 text-center"
                aria-label="Estado de resultados"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-calendar mx-auto mb-3 h-8 w-8 text-muted-foreground md:h-10 md:w-10"
                    aria-hidden="true"
                >
                    <path d="M8 2v4"></path>
                    <path d="M16 2v4"></path>
                    <rect width="18" height="18" x="3" y="4" rx="2"></rect>
                    <path d="M3 10h18"></path>
                </svg>
                <p
                    class="text-base font-semibold text-foreground md:text-lg lg:text-xl"
                >
                    Los resultados de la JIC Nacional {% now "Y" %} serán
                    publicados al finalizar el evento.
                </p>
                <p class="mt-2 text-xs text-muted-foreground md:text-sm">
                    Visita esta página después del evento para ver los
                    resultados oficiales.
                </p>
            </aside>
        </div>
    </div>
</section>
