{% if messages %}
<div
    class="fixed z-50 flex flex-col gap-2 px-4 pt-3"
    style="position: fixed; top: 4.5rem; right: 7rem"
>
    {% for message in messages %}
    <div
        class="mx-auto w-full max-w-2xl flex items-center justify-between gap-3 rounded-xl border border-border bg-card px-4 py-3 shadow-lg"
        role="alert"
    >
        <div class="flex items-center gap-2 text-sm text-foreground">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 shrink-0 text-primary"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                />
            </svg>
            {{ message }}
        </div>
        <button
            onclick="this.parentElement.remove()"
            class="cursor-pointer shrink-0 text-muted-foreground hover:text-foreground transition-colors"
            aria-label="Cerrar"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                />
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
