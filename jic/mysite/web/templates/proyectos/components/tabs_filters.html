<section class="border-b border-border bg-card">
    <div class="mx-auto max-w-7xl px-4 lg:px-8">
        <form method="get" aria-label="Filtros de proyectos">
            {# Hidden input preserves the active tab when the filters form is submitted #}
            <input type="hidden" name="tab" value="{{ tab }}">

            <!-- Tabs -->
            <div class="flex gap-0 overflow-x-auto border-b border-border">
                <button
                    type="submit"
                    name="tab"
                    value="all"
                    class="cursor-pointer shrink-0 flex items-center gap-2 border-b-2 px-3 py-3 text-sm font-medium transition-colors {% if tab == 'all' or not tab %}border-primary text-primary{% else %}border-transparent text-muted-foreground hover:text-foreground{% endif %}"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                        ><path d="M12 7v14"></path><path
                            d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"
                        ></path></svg
                    >
                    Todos los proyectos
                </button>
                <button
                    type="submit"
                    name="tab"
                    value="winners"
                    class="cursor-pointer shrink-0 flex items-center gap-2 border-b-2 px-3 py-3 text-sm font-medium transition-colors {% if tab == 'winners' %}border-golden text-golden{% else %}border-transparent text-muted-foreground hover:text-foreground{% endif %}"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                        ><path
                            d="M10 14.66v1.626a2 2 0 0 1-.976 1.696A5 5 0 0 0 7 21.978"
                        ></path><path
                            d="M14 14.66v1.626a2 2 0 0 0 .976 1.696A5 5 0 0 1 17 21.978"
                        ></path><path d="M18 9h1.5a1 1 0 0 0 0-5H18"></path><path
                            d="M4 22h16"
                        ></path><path
                            d="M6 9a6 6 0 0 0 12 0V3a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1z"
                        ></path><path d="M6 9H4.5a1 1 0 0 1 0-5H6"></path></svg
                    >
                    Ganadores
                </button>
            </div>

            <!-- Search & Filters -->
            <div class="flex flex-col gap-3 py-4 lg:flex-row lg:items-center">
                <!-- Search input: full width on mobile, flex on lg+ -->
                <div class="relative w-full lg:flex-1">
                    <label for="projects-search" class="sr-only">Buscar proyectos</label>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground"
                        aria-hidden="true"
                    >
                        <path d="m21 21-4.34-4.34"></path>
                        <circle cx="11" cy="11" r="8"></circle>
                    </svg>
                    <input
                        id="projects-search"
                        type="text"
                        name="search"
                        aria-label="Buscar por título o universidad"
                        placeholder="Buscar por título o universidad..."
                        value="{{ search }}"
                        class="w-full rounded-lg border border-input bg-stone-neutral-50 py-2 pl-10 pr-4 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
                    />
                </div>

                <!-- Filters row: stack on mobile, row on sm+ -->
                <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="hidden sm:block h-5 w-5 shrink-0 text-muted-foreground"
                        aria-hidden="true"
                    >
                        <path
                            d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"
                        ></path>
                    </svg>

                    <label for="projects-year" class="sr-only">Filtrar por año</label>
                    <select
                        id="projects-year"
                        name="year"
                        aria-label="Filtrar por año"
                        class="cursor-pointer w-full sm:w-auto appearance-none rounded-lg border border-input bg-stone-neutral-50 px-3 py-2 pr-10 text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-ring"
                    >
                        <option value="all" {% if year_filter == 'all' %}selected{% endif %}>Todos los años</option>
                        {% for y in years %}
                            <option value="{{ y }}" {% if year_filter|stringformat:'s' == y|stringformat:'s' %}selected{% endif %}>{{ y }}</option>
                        {% endfor %}
                    </select>

                    <label for="projects-category" class="sr-only">Filtrar por categoría</label>
                    <select
                        id="projects-category"
                        name="category"
                        aria-label="Filtrar por categoría"
                        class="cursor-pointer w-full sm:w-auto appearance-none rounded-lg border border-input bg-stone-neutral-50 px-3 py-2 pr-10 text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-ring"
                    >
                        {% for c in categories_options %}
                            <option value="{{ c.value }}" {% if category_filter == c.value %}selected{% endif %}>{{ c.label }}</option>
                        {% endfor %}
                    </select>

                    <label for="projects-university" class="sr-only">Filtrar por universidad</label>
                    <select
                        id="projects-university"
                        name="university"
                        aria-label="Filtrar por universidad"
                        class="cursor-pointer w-full sm:w-52 md:w-64 appearance-none rounded-lg border border-input bg-stone-neutral-50 px-3 py-2 pr-10 text-sm text-foreground whitespace-normal wrap-break-word focus:outline-none focus:ring-2 focus:ring-ring"
                    >
                        {% for u in universities_options %}
                            <option value="{{ u.value }}" {% if university_filter == u.value %}selected{% endif %}>{{ u.label }}</option>
                        {% endfor %}
                    </select>

                    <button
                        type="submit"
                        class="cursor-pointer w-full sm:w-auto px-4 py-2 rounded-lg bg-primary text-primary-foreground text-sm font-medium hover:bg-primary/90"
                    >
                        Buscar
                    </button>
                </div>
            </div>
        </form>
    </div>
</section>
