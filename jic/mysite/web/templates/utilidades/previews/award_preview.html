{% extends "utilidades/previews/_preview_base.html" %}
{% block content %}
<div class="mx-auto max-w-7xl px-4 py-8">
    <div class="mb-8 text-center">
        <h2 class="font-serif text-2xl text-foreground">Reconocimientos</h2>
        <p class="mt-2 text-muted-foreground">Vista previa</p>
    </div>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <div class="rounded-xl border border-border bg-stone-50 p-5 flex flex-col gap-3">
            <div class="flex items-start gap-3">
                <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-amber-300/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500">
                        <path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15" />
                        <path d="M11 12 5.12 2.2" /><path d="m13 12 5.88-9.8" />
                        <path d="M8 7h8" /><circle cx="12" cy="17" r="5" />
                        <path d="M12 18v-2h-.5" />
                    </svg>
                </div>
                <div>
                    <span class="inline-block rounded-full bg-amber-300/20 px-2.5 py-0.5 text-xs font-semibold text-amber-700 mb-1">{{ snippet.year }}</span>
                    <h3 class="font-semibold text-foreground leading-snug">{{ snippet.prize }}</h3>
                    <p class="text-xs text-muted-foreground mt-0.5">{{ snippet.entity }}</p>
                </div>
            </div>
            <p class="text-sm text-muted-foreground leading-relaxed">{{ snippet.description }}</p>
        </div>
    </div>
</div>
{% endblock %}
