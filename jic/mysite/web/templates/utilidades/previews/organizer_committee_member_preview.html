{% extends "utilidades/previews/_preview_base.html" %}
{% block content %}
<div class="mx-auto max-w-7xl px-4 py-8">
    <div class="mb-8 text-center">
        <h2 class="font-serif text-2xl text-foreground">Comité Organizador</h2>
        <p class="mt-2 text-muted-foreground">Vista previa</p>
    </div>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <div class="rounded-lg border border-border bg-card p-6">
            {% if snippet.photo %}
            <div class="mb-4">
                <img src="{{ snippet.photo.url }}" alt="{{ snippet.name }}" class="w-full h-40 object-cover rounded-lg">
            </div>
            {% endif %}
            <h3 class="font-semibold text-lg text-foreground mb-1">{{ snippet.name }}</h3>
            <p class="text-sm font-medium text-primary mb-3">{{ snippet.role }}</p>
            <p class="text-sm text-muted-foreground mb-2">{{ snippet.institution }}</p>
            {% if not snippet.is_active %}
            <div class="mt-4 p-2 bg-amber-100 text-amber-800 text-xs font-semibold rounded">Inactivo</div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
