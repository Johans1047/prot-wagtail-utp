{% extends "utilidades/previews/_preview_base.html" %}
{% block content %}
<section class="py-8 bg-stone-neutral-50">
    <div class="mx-auto max-w-7xl px-4">
        <div class="mb-10 flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-grid3x3 h-6 w-6 text-teal" aria-hidden="true">
                <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                <path d="M3 9h18"></path><path d="M3 15h18"></path>
                <path d="M9 3v18"></path><path d="M15 3v18"></path>
            </svg>
            <h2 class="font-serif font-extrabold tracking-tight text-2xl text-foreground">Categorías</h2>
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
            <div class="rounded-xl border border-border bg-card p-6 transition-colors hover:border-teal/30">
                <h3 class="text-lg font-semibold text-foreground">{{ snippet.name }}</h3>
                <p class="mt-2 text-sm leading-relaxed text-muted-foreground">{{ snippet.description }}</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
