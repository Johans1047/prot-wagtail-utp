{% with titulo=titulo|default:"La JIC" descripcion=descripcion|default:"Descripción por defecto" color=color|default:"bg-primary" text_color=text_color|default:"text-primary-foreground" %}
<section class="{{ color }} py-16 lg:py-20">
    <div class="mx-auto max-w-7xl px-4 lg:px-8">
        <div class="max-w-2xl">
            <h1 class="font-serif font-extrabold tracking-tight text-4xl {{ text_color }} md:text-5xl">
                {{ titulo }}
            </h1>
            <p class="mt-4 text-lg leading-relaxed {{ text_color }}/70">
                {{ descripcion }}
            </p>
        </div>
    </div>
</section>
{% endwith %}
