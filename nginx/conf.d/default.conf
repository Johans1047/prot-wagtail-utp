# JIC Wagtail CMS - Nginx Configuration
# Production server configuration with gunicorn backend

server {
    listen 80;
    server_name _;
    
    # Redirect HTTP to HTTPS (descomentar en producción con SSL)
    # return 301 https://$server_name$request_uri;
    
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static files cache
    location /static/ {
        alias /app/mysite/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files cache
    location /media/ {
        alias /app/mysite/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Favicon and robots
    location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        alias /app/mysite/staticfiles/$1;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Health check endpoint (no logging)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Main application
    location / {
        # Rate limiting (activo por defecto)
        limit_req zone=general burst=20 nodelay;
        
        # Proxy headers
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 24 4k;
        proxy_busy_buffers_size 8k;
        
        # Connection reuse
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
}

