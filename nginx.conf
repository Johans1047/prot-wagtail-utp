# Asigna el número máximo de conexiones que cada trabajador puede manejar
events {
   worker_connections 1024;
}

http {
    server {
        # Carga los tipos MIME estándar (ej: text/html, image/jpeg) para que el servidor
        # sepa qué Content-Type enviar según la extensión del archivo
        include mime.types;

        # Tipo de contenido por defecto cuando no se puede determinar el tipo MIME del archivo
        default_type application/octet-stream;

        # Activa la transferencia directa de archivos entre descriptores de archivo del kernel,
        # evitando copias innecesarias en memoria (mejora el rendimiento)
        sendfile on;

        # Tiempo máximo que una conexión persistente (keep-alive) permanece abierta
        # sin actividad antes de cerrarse (en segundos)
        keepalive_timeout 65;

        # Puerto en el que el servidor escucha las peticiones HTTP entrantes
        listen 80;

        # ── Archivos estáticos ──────────────────────────────────────────────────────
        # Las peticiones a /static/ se sirven directamente desde el directorio /static/
        # sin pasar por Django, reduciendo la carga en la aplicación
        location /static/ {
            # Mapea la URL /static/ al directorio físico /static/ en el servidor
            alias /app/staticfiles/; 

            # Indica al navegador que almacene en caché estos archivos durante 7 días,
            # reduciendo peticiones repetidas al servidor
            expires 7d;
        }

        # ── Archivos multimedia (deshabilitado) ─────────────────────────────────────
        # Bloque comentado para servir archivos subidos por usuarios (imágenes, videos, etc.)
        # desde el directorio de archivos de medios de Django
        # location /media/ {
        #     alias /home/app/web/mediafiles/;
        # }

        # ── Aplicación Django ───────────────────────────────────────────────────────
        # Maneja todas las demás peticiones que no coincidan con los bloques anteriores
        location / {
            # Reenvía las peticiones al servidor de aplicaciones Django (Gunicorn/uWSGI)
            # que corre en el contenedor "jicweb_app" en el puerto 8000
            proxy_pass http://jicweb_app:8000;

            # Encabezado con el nombre de dominio original solicitado por el cliente.
            # Necesario para que Django genere URLs correctas y valide ALLOWED_HOSTS
            proxy_set_header Host $host;

            # IP real del cliente. Útil para logs, rate limiting y geolocalización en Django
            proxy_set_header X-Real-IP $remote_addr;

            # Lista de IPs por las que pasó la petición (cliente → proxies intermedios → nginx).
            # Permite rastrear la ruta completa de la petición
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Protocolo original usado por el cliente (http o https).
            # Permite que Django sepa si la conexión original era segura, aunque
            # internamente llegue como HTTP
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Archivos Multimedia (Minio Proxy) ────────────────────────────────────────
        location ^~ /media/ {
            # 'jic_minio_storage' es el nombre de tu servicio en el docker-compose
            proxy_pass http://jic_minio_storage:9000/;
        
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Importante para subidas de archivos grandes
            client_max_body_size 100M;
        }
    }
}